<svg viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#00A67E"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00A67E"/>
      <stop offset="100%" stop-color="#58A6FF"/>
    </linearGradient>
    <linearGradient id="barC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#FFD21E"/>
    </linearGradient>
    <style>
      .track { fill: #21262D; }
      .lbl { fill: #C9D1D9; font-size: 14px; font-weight: 600; }
      .pct { fill: #E6EDF3; font-size: 14px; font-weight: 700; }
      .cap { fill: #8B949E; font-size: 12px; }
      .bar { animation: grow 1.6s cubic-bezier(.16,1,.3,1) forwards; }
      .b1 { animation-delay: .1s; }
      .b2 { animation-delay: .4s; }
      .b3 { animation-delay: .7s; }
      @keyframes grow {
        from { width: 0; }
      }
      .flicker { animation: fade 1.6s ease forwards; opacity: 0; }
      .f1 { animation-delay: 1.5s; }
      .f2 { animation-delay: 1.8s; }
      .f3 { animation-delay: 2.1s; }
      @keyframes fade { to { opacity: 1; } }
    </style>
  </defs>

  <rect x="0" y="0" width="800" height="220" rx="16" fill="url(#bg2)"/>
  <text x="30" y="38" class="lbl" font-size="16">Eval results — seeded bug repo (July 19, 2026)</text>

  <!-- Detection rate -->
  <text x="30" y="78" class="lbl">Detection rate</text>
  <rect x="230" y="64" width="500" height="18" rx="9" class="track"/>
  <rect x="230" y="64" height="18" rx="9" fill="url(#barA)" class="bar b1" style="width:500px"/>
  <text x="748" y="78" class="pct flicker f1" text-anchor="end">100%</text>

  <!-- Fix success rate -->
  <text x="30" y="128" class="lbl">Fix success rate</text>
  <rect x="230" y="114" width="500" height="18" rx="9" class="track"/>
  <rect x="230" y="114" height="18" rx="9" fill="url(#barB)" class="bar b2" style="width:429px"/>
  <text x="748" y="128" class="pct flicker f2" text-anchor="end">85.7%</text>

  <!-- Tests passing -->
  <text x="30" y="178" class="lbl">Tests passing after fix</text>
  <rect x="230" y="164" width="500" height="18" rx="9" class="track"/>
  <rect x="230" y="164" height="18" rx="9" fill="url(#barC)" class="bar b3" style="width:500px"/>
  <text x="748" y="178" class="pct flicker f3" text-anchor="end">6 / 6</text>

  <text x="30" y="205" class="cap">7 seeded bugs · 0 false positives · refresh the page to replay the animation</text>
</svg>
